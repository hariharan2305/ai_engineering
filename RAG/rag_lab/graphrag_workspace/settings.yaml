### GraphRAG Settings — RAG Lab Experiment
### Uses gpt-4o-mini to control cost. text-embedding-3-small for entity embeddings.
### Full config reference: https://microsoft.github.io/graphrag/config/yaml/

### LLM settings ###
completion_models:
  default_completion_model:
    model_provider: openai
    model: gpt-4o-mini
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:
    model_provider: openai
    model: text-embedding-3-small
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    retry:
      type: exponential_backoff

### Input ###
# markitdown type handles: .txt, .md, .html, .pdf, .docx and more
# file_pattern is a regex applied to filenames in input_storage.base_dir
input:
  type: markitdown
  file_pattern: ".*\\.(txt|md|html|pdf|docx)$$"
  encoding: utf-8

### Storage ###
input_storage:
  type: file
  base_dir: "input"

output_storage:
  type: file
  base_dir: "output"

reporting:
  type: file
  base_dir: "logs"

cache:
  type: json
  storage:
    type: file
    base_dir: "cache"

vector_store:
  type: lancedb
  db_uri: output/lancedb
  # Must match the output dimension of the embedding model.
  # text-embedding-3-small = 1536, text-embedding-3-large = 3072 (default).
  # Mismatch causes LanceDB schema errors — always reset output/ when changing this.
  vector_size: 1536

### Chunking ###
chunking:
  type: tokens
  size: 1200
  overlap: 100
  encoding_model: o200k_base

### Graph extraction ###
extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/extract_graph.txt"
  # Broad entity types suited for technical RAG/ML corpus
  entity_types: [concept,algorithm,system,method,metric,person,organization,tool]
  max_gleanings: 1

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: false
  completion_model_id: default_completion_model
  prompt: "prompts/extract_claims.txt"
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 1

### Community reports ###
community_reports:
  completion_model_id: default_completion_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 2000
  max_input_length: 8000

snapshots:
  graphml: false
  embeddings: false

### Embedding ###
embed_text:
  embedding_model_id: default_embedding_model

### Query ###
local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  completion_model_id: default_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_search_reduce_prompt.txt"

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"
